<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <img src="" alt="logo">
            <ul>
                <li><a href="#">Hébergement</a></li>
                <li><a href="#">Activités</a></li>
            </ul>
        </nav>
        <h1>Trouvez votre hébergement pour des vacances de rêve</h1>
        <p>En plein centre-ville ou en pleine nature</p>
        <section class="search">
            <form action="" method="get">
                <img src="" alt="">
                <label for="search" class="visually-hidden">Ville</label>
                <input id="search" name="city" type="text" placeholder="Marseille, France ?" required>
                <button type="submit"> Rechercher </button>
            </form>
        </section>
        <section class="filters">
            <h2>Filtres</h2>
            <div class="buttons_filters">
                <button>Économique</button>
                <button>Familial</button>
                <button>Romantique</button>
                <button>Nos pépites</button>
            </div>
        </section>
        <section class="info">
            <img src="" alt="info">
            <p>Plus de 500 logements sont disponibles dans cette ville</p>
        </section>
    </header>
</body>
</html>
